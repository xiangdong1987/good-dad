<svg width="1024" height="1024" viewBox="0 0 1024 1024" xmlns="http://www.w3.org/2000/svg">
  <!--
    good-dad app icon
    style: cream + peach, 2px ink900 stroke (scaled to 24px @ 1024)
    motif: a chubby smiling face (dad/baby ambiguous on purpose) +
           a peach heart sticker accent (top-right)
  -->

  <!-- Background — cream100 -->
  <rect width="1024" height="1024" fill="#FFF4E6"/>

  <!-- Subtle decorative dots (cream300) -->
  <circle cx="150" cy="180" r="14" fill="#F8DDB8"/>
  <circle cx="900" cy="160" r="10" fill="#F8DDB8"/>
  <circle cx="170" cy="880" r="12" fill="#F8DDB8"/>
  <circle cx="880" cy="900" r="14" fill="#F8DDB8"/>

  <!-- Drop shadow for face (落地阴影：纯色不模糊) -->
  <circle cx="500" cy="556" r="300" fill="#3D2E22"/>

  <!-- Main face — peach200 fill, ink900 stroke -->
  <circle cx="500" cy="540" r="300" fill="#FFD9C7" stroke="#3D2E22" stroke-width="24"/>

  <!-- Eyebrows (giving the "dad" vibe — short & friendly) -->
  <path d="M 380 430 Q 410 415 440 430" fill="none" stroke="#3D2E22" stroke-width="20" stroke-linecap="round"/>
  <path d="M 560 430 Q 590 415 620 430" fill="none" stroke="#3D2E22" stroke-width="20" stroke-linecap="round"/>

  <!-- Closed-eye smiles (^_^) -->
  <path d="M 380 510 Q 410 478 440 510" fill="none" stroke="#3D2E22" stroke-width="22" stroke-linecap="round"/>
  <path d="M 560 510 Q 590 478 620 510" fill="none" stroke="#3D2E22" stroke-width="22" stroke-linecap="round"/>

  <!-- Blush cheeks (peach300, soft) -->
  <ellipse cx="370" cy="608" rx="42" ry="22" fill="#FF8F6B" opacity="0.55"/>
  <ellipse cx="630" cy="608" rx="42" ry="22" fill="#FF8F6B" opacity="0.55"/>

  <!-- Smile mouth (open, round, ink filled for "talking happily") -->
  <path d="M 440 600 Q 500 700 560 600 Q 530 660 470 660 Q 455 645 440 600 Z"
        fill="#3D2E22" stroke="#3D2E22" stroke-width="16" stroke-linejoin="round"/>
  <!-- Tongue hint inside mouth (peach) -->
  <ellipse cx="500" cy="650" rx="32" ry="12" fill="#E07A8B"/>

  <!-- Top-right peach heart "sticker" — separate accent, micro-rotated -->
  <g transform="translate(820 220) rotate(12)">
    <!-- shadow -->
    <path d="M 0 14 C -42 -28, -120 -10, -120 50 C -120 110, -50 150, 0 184 C 50 150, 120 110, 120 50 C 120 -10, 42 -28, 0 14 Z"
          fill="#3D2E22"/>
    <!-- heart -->
    <path d="M 0 0 C -42 -42, -120 -24, -120 36 C -120 96, -50 136, 0 170 C 50 136, 120 96, 120 36 C 120 -24, 42 -42, 0 0 Z"
          fill="#FF8F6B" stroke="#3D2E22" stroke-width="20" stroke-linejoin="round"/>
  </g>
</svg>
