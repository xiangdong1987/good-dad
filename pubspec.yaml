name: good_dad
description: "good-dad: a Flutter app to help me become a qualified dad"
publish_to: 'none'
version: 0.1.0+1

environment:
  sdk: ^3.11.3

dependencies:
  flutter:
    sdk: flutter
  cupertino_icons: ^1.0.8

  # State management & routing
  flutter_riverpod: ^2.5.1
  go_router: ^14.0.0

  # HTTP / LLM
  dio: ^5.4.0

  # Local storage
  drift: ^2.18.0
  sqlite3_flutter_libs: ^0.5.20
  path_provider: ^2.1.3
  path: ^1.9.0

  # Secure storage for API keys
  flutter_secure_storage: ^9.0.0

  # SKILL.md parsing
  yaml: ^3.1.2
  markdown: ^7.2.2
  flutter_markdown: ^0.7.1

  # Image / camera / sharing
  image_picker: ^1.1.0
  image: ^4.1.7
  share_plus: ^10.1.4

  # Backup (zip 打包 + 文件选择)
  archive: ^4.0.0
  file_picker: ^8.1.4

  # Notifications
  flutter_local_notifications: ^17.1.2
  timezone: ^0.9.4

  # Utilities
  collection: ^1.18.0
  intl: ^0.19.0
  uuid: ^4.4.0
  crypto: ^3.0.3

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^6.0.0
  build_runner: ^2.4.9
  drift_dev: ^2.18.0
  mocktail: ^1.0.3

flutter:
  uses-material-design: true
  assets:
    - assets/skills/chat/
    - assets/skills/food-safety/
    - assets/skills/pregnancy-recipe/
    - assets/skills/pregnancy-week/
    - assets/skills/belly-photo/
    - assets/skills/prenatal-prep/
    - assets/skills/baby-shopping/
