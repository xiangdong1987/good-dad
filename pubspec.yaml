name: good_dad
description: "good-dad: a Flutter app to help me become a qualified dad"
publish_to: 'none'
version: 0.1.0+1

environment:
  sdk: ^3.11.3

dependencies:
  flutter:
    sdk: flutter
  flutter_localizations:
    sdk: flutter
  cupertino_icons: ^1.0.8

  # State management & routing
  flutter_riverpod: ^2.5.1
  go_router: ^14.0.0

  # HTTP / LLM
  dio: ^5.4.0

  # Local storage
  drift: ^2.18.0
  sqlite3_flutter_libs: ^0.5.20
  path_provider: ^2.1.3
  path: ^1.9.0

  # Secure storage for API keys
  flutter_secure_storage: ^9.0.0

  # SKILL.md parsing
  yaml: ^3.1.2
  markdown: ^7.2.2
  flutter_markdown: ^0.7.1

  # Image / camera / sharing
  image_picker: ^1.1.0
  image: ^4.1.7
  share_plus: ^10.1.4

  # Backup (zip 打包 + 文件选择)
  archive: ^4.0.0
  file_picker: ^8.1.4

  # Notifications
  flutter_local_notifications: ^17.1.2
  timezone: ^0.9.4

  # Voice agent (xiaomimimo audio understanding + TTS)
  # record 录 WAV/PCM/AAC 各平台稳定；如果 mimo 必须 MP3，再加 ffmpeg 转。
  record: ^5.2.1
  just_audio: ^0.9.40
  permission_handler: ^11.3.1
  # 系统 TTS 兜底：mimo TTS 没配置或失败时，用平台原生 TTS 念出来。
  flutter_tts: ^4.2.0

  # Utilities
  collection: ^1.18.0
  intl: ^0.20.2
  uuid: ^4.4.0
  crypto: ^3.0.3

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^6.0.0
  build_runner: ^2.4.9
  drift_dev: ^2.18.0
  mocktail: ^1.0.3
  flutter_launcher_icons: ^0.14.1
  flutter_native_splash: ^2.4.0

# pub 自动解析把 record_linux 锁到了过老的 0.7.2，跟 platform_interface 1.5.0 接口
# 缺方法导致 kernel_snapshot 编译失败。强制升到 1.x。mobile 端不走 linux 实现。
dependency_overrides:
  record_linux: ^1.0.0


# ── App icon（运行：dart run flutter_launcher_icons） ──
flutter_launcher_icons:
  android: true
  ios: true
  image_path: "assets/branding/app_icon_1024.png"
  remove_alpha_ios: true
  adaptive_icon_background: "#FFFBF5"
  adaptive_icon_foreground: "assets/branding/app_icon_1024.png"
  min_sdk_android: 23

# ── Splash screen（运行：dart run flutter_native_splash:create） ──
flutter_native_splash:
  color: "#FFFBF5"
  image: "assets/branding/app_icon_1024.png"
  android_12:
    color: "#FFFBF5"
    image: "assets/branding/app_icon_1024.png"
  ios: true
  android: true
  fullscreen: false

flutter:
  uses-material-design: true
  assets:
    - assets/skills/chat/
    - assets/skills/food-safety/
    - assets/skills/pregnancy-recipe/
    - assets/skills/pregnancy-week/
    - assets/skills/belly-photo/
    - assets/skills/prenatal-prep/
    - assets/skills/baby-shopping/
    - assets/skills/italian-license/
    - assets/skills/italian-vocab-study/
    - assets/skills/italian-lookup/
